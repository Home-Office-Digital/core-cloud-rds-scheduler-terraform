name: "Terraform Test (local fork)"
description: "Run Terraform tests when .tftest.hcl files are present and optionally publish SonarQube results (local fork).
This fork adds a 'test-directory' input which will be passed to 'terraform test'."

inputs:
  sonar-host-url:
    description: "SonarQube server URL"
    required: false
    default: ''
  sonar-token:
    description: "SonarQube authentication token"
    required: false
    default: ''
  working-directory:
    description: "Directory containing Terraform code and tests"
    required: false
    default: '.'
  test-directory:
    description: "Optional path to pass to terraform test via -test-directory"
    required: false
    default: ''

outputs:
  has-tests:
    description: "Whether Terraform tests were detected"
    value: ${{ steps.detect_terraform_tests.outputs.has_tests }}

runs:
  using: composite

  steps:
    - name: Detect Terraform Tests
      id: detect_terraform_tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if find . -type f -name "*.tftest.hcl" | grep -q .; then
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "Terraform tests detected. Running test steps."
        else
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
          echo "No Terraform tests detected. Skipping Terraform test steps."
        fi

    - name: Run Terraform Tests
      if: steps.detect_terraform_tests.outputs.has_tests == 'true'
      id: terraform_test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.test-directory }}" ]; then
          OUT_DIR="${{ inputs.test-directory }}"
          mkdir -p "$OUT_DIR"
          terraform test -junit-xml="$OUT_DIR/test-results.xml" -test-directory="${{ inputs.test-directory }}" || true
        else
          terraform test -junit-xml=test-results.xml || true
        fi
      continue-on-error: true

    - name: Convert Terraform JUnit To SonarQube Generic Test Report
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-directory }}" ]; then
          IN_FILE="${{ inputs.test-directory }}/test-results.xml"
          OUT_FILE="${{ inputs.test-directory }}/sonar-test-results.xml"
        else
          IN_FILE="test-results.xml"
          OUT_FILE="sonar-test-results.xml"
        fi
        python3 "${{ github.action_path }}/../../scripts/terraform_junit_to_sonar.py" --input "$IN_FILE" --output "$OUT_FILE"

    - name: Convert Terraform JUnit To SonarQube Generic Coverage Report
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-directory }}" ]; then
          IN_FILE="${{ inputs.test-directory }}/test-results.xml"
          OUT_FILE="${{ inputs.test-directory }}/sonar-coverage.xml"
        else
          IN_FILE="test-results.xml"
          OUT_FILE="sonar-coverage.xml"
        fi
        python3 "${{ github.action_path }}/../../scripts/terraform_junit_to_sonar_coverage.py" --input "$IN_FILE" --output "$OUT_FILE"

    - name: Validate SonarQube Test Report Contains Test Cases
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-directory }}" ]; then
          FILE="${{ inputs.test-directory }}/sonar-test-results.xml"
        else
          FILE="sonar-test-results.xml"
        fi
        # If converter didn't generate the sonar test file, create an empty wrapper
        if [ ! -f "$FILE" ]; then
          echo '<testExecutions version="1"></testExecutions>' > "$FILE"
        fi
        grep -q "<testExecutions " "$FILE"

    - name: Validate SonarQube Coverage Report Contains Coverage Root
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-directory }}" ]; then
          FILE="${{ inputs.test-directory }}/sonar-coverage.xml"
        else
          FILE="sonar-coverage.xml"
        fi
        # If converter didn't produce a coverage file, create a minimal one so Sonar scan can continue.
        if [ ! -f "$FILE" ]; then
          echo '<coverage version="1"></coverage>' > "$FILE"
        fi
        grep -q "<coverage " "$FILE"

    - name: Print Generated Reports
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.test-directory }}" ]; then
          cat "${{ inputs.test-directory }}/test-results.xml" || true
          cat "${{ inputs.test-directory }}/sonar-test-results.xml" || true
          cat "${{ inputs.test-directory }}/sonar-coverage.xml" || true
        else
          cat test-results.xml || true
          cat sonar-test-results.xml || true
          cat sonar-coverage.xml || true
        fi

    - name: Ensure Sonar report paths at repository root
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      shell: bash
      run: |
        # Try to copy sonar reports from the test-directory (if provided) into the repo root
        if [ -n "${{ inputs.test-directory }}" ]; then
          SRC_TEST_DIR="${{ github.workspace }}/${{ inputs.test-directory }}"
          if [ -f "$SRC_TEST_DIR/sonar-test-results.xml" ]; then
            cp "$SRC_TEST_DIR/sonar-test-results.xml" "$GITHUB_WORKSPACE/sonar-test-results.xml" || true
          fi
          if [ -f "$SRC_TEST_DIR/sonar-coverage.xml" ]; then
            cp "$SRC_TEST_DIR/sonar-coverage.xml" "$GITHUB_WORKSPACE/sonar-coverage.xml" || true
          fi
        fi

        # Also attempt to copy from the working-directory
        SRC_WD="${{ github.workspace }}/${{ inputs.working-directory }}"
        if [ -f "$SRC_WD/sonar-test-results.xml" ]; then
          cp "$SRC_WD/sonar-test-results.xml" "$GITHUB_WORKSPACE/sonar-test-results.xml" || true
        fi
        if [ -f "$SRC_WD/sonar-coverage.xml" ]; then
          cp "$SRC_WD/sonar-coverage.xml" "$GITHUB_WORKSPACE/sonar-coverage.xml" || true
        fi

        echo "Reports at repo root:"
        ls -la sonar-test-results.xml sonar-coverage.xml || true

    - name: SonarQube Scan
      if: always() && steps.detect_terraform_tests.outputs.has_tests == 'true' && inputs.sonar-token != '' && inputs.sonar-host-url != ''
      uses: sonarsource/sonarqube-scan-action@v7
      with:
        args: >
          -Dsonar.projectBaseDir=${{ inputs.working-directory }}
          -Dsonar.exclusions=**/.terraform/**,**/test-results.xml,**/sonar-test-results.xml,**/sonar-coverage.xml,**/.scannerwork/**
          -Dsonar.sources=.
          -Dsonar.inclusions=**/*.tf,**/*.tfvars,tests/**/*.tftest.hcl
          -Dsonar.terraform.file.suffixes=.tf,.tfvars,.tftest.hcl
          -Dsonar.tests=tests
          -Dsonar.test.inclusions=tests/**/*.tftest.hcl
          -Dsonar.test.exclusions=tests/sonar_test_anchor.py
          -Dsonar.text.inclusions=tests/**/*.tftest.hcl
          -Dsonar.testExecutionReportPaths=sonar-test-results.xml
          -Dsonar.coverageReportPaths=sonar-coverage.xml
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}

    - name: Fail If Terraform Tests Failed
      if: steps.detect_terraform_tests.outputs.has_tests == 'true' && steps.terraform_test.outcome == 'failure'
      shell: bash
      run: exit 1
