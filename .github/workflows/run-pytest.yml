name: Execute Pytests for the Aurora Cluster Scheduler
permissions:
  contents: read

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main

  push:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage

      - name: Run tests
        run: |
          mkdir -p test-artifacts
          pytest -q | tee test-artifacts/pytest.log

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-artifacts
