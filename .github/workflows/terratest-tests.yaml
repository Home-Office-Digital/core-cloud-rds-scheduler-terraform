name: Terratest Integration Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terratest-tests:
    name: terratest (go)
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      ROLE_TO_ASSUME: arn:aws:iam::741448916464:role/cc-ssm-rds-scheduled-stop-start-role-test-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20

      - name: Verify Go installation
        run: |
          echo "--- go version ---"
          go version || true
          echo "--- which go ---"
          which go || true
          echo "--- go env ---"
          go env GOROOT GOMOD GOPATH || true
          # Fail fast if runner has an ancient go that doesn't support modules
          if go version 2>/dev/null | grep -Eo "go[0-9]+\.[0-9]+" | sed 's/go//' | awk -F. '{ if ($1==1 && $2<11) { exit 1 } }'; then
            echo "go version is too old for modules (requires >= 1.11)" >&2
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::741448916464:role/cc-ssm-rds-scheduled-stop-start-role-test-automation

      - name: Get Go modules
        run: |
          set -euo pipefail
          if [ -f tests/terratest/go.mod ]; then
            (cd tests/terratest && go mod download)
          else
            echo "no go.mod found in tests/terratest" >&2
            exit 1
          fi

      - name: Run Terratest
        id: terratest-test
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ROLE_TO_ASSUME: ${{ env.ROLE_TO_ASSUME }}
        run: |
          set +e
          go test -v ./tests/terratest -timeout 60m 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          PASSED=$(grep -c "^--- PASS" test_output.txt | tr -d '[:space:]' || echo "0")
          FAILED=$(grep -c "^--- FAIL" test_output.txt | tr -d '[:space:]' || echo "0")

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${TEST_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.terratest-test.outputs.passed }}' || '0';
            const failed = '${{ steps.terratest-test.outputs.failed }}' || '0';
            const exitCode = '${{ steps.terratest-test.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ pass' : '❌ fail';
            const overall = exitCode === '0'
              ? `✅ Overall: passed=${passed}, failed=0, errored=0, skipped=0`
              : `❌ Overall: passed=${passed}, failed=${failed}, errored=0, skipped=0`;

            const body = `## Terratest Test Results\n\n${overall}\n\n| Repo | Status | Passed | Failed |\n|--------|--------|--------|--------|\n| core-cloud-rds-scheduler-terraform | ${status} | ${passed} | ${failed} |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
