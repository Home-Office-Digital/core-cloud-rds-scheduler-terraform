name: Terratest Integration Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terratest-tests:
    name: terratest (go)
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      ROLE_TO_ASSUME: arn:aws:iam::741448916464:role/cc-ssm-rds-scheduled-stop-start-role-test-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.0'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Assume privileged role
        id: assume-priv
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y jq
          PRIV_ROLE="arn:aws:iam::741448916464:role/cc-ssm-rds-scheduled-stop-start-role-test-assumable"
          CREDS_JSON=$(aws sts assume-role --role-arn "$PRIV_ROLE" --role-session-name github-actions)
          AWS_ACCESS_KEY_ID=$(echo "$CREDS_JSON" | jq -r '.Credentials.AccessKeyId')
          AWS_SECRET_ACCESS_KEY=$(echo "$CREDS_JSON" | jq -r '.Credentials.SecretAccessKey')
          AWS_SESSION_TOKEN=$(echo "$CREDS_JSON" | jq -r '.Credentials.SessionToken')
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" >> $GITHUB_ENV
          # Ensure subsequent steps (terraform/terratest) use the privileged automation role
          echo "TF_VAR_automation_role_arn=$PRIV_ROLE" >> $GITHUB_ENV
          echo "ROLE_TO_ASSUME=$PRIV_ROLE" >> $GITHUB_ENV
          aws sts get-caller-identity

      - name: CI diagnostics
        run: |
          set -euo pipefail
          echo "=== caller identity ==="
          aws sts get-caller-identity || true
          echo "=== exported automation role (TF_VAR_automation_role_arn) ==="
          echo "$TF_VAR_automation_role_arn"
          ROLE_NAME="${TF_VAR_automation_role_arn##*/}"
          echo "=== assume role policy for $ROLE_NAME ==="
          aws iam get-role --role-name "$ROLE_NAME" --query 'Role.AssumeRolePolicyDocument' --output json || true
          echo "=== recent failed SSM automation executions ==="
          aws ssm describe-automation-executions --filters Key=ExecutionStatus,Values=Failed --max-results 10 || true

      - name: Get Go modules
        run: go mod download
        working-directory: tests/terratest

      - name: Run Terratest
        id: terratest-test
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ROLE_TO_ASSUME: ${{ env.ROLE_TO_ASSUME }}
        working-directory: tests/terratest
        run: |
          set +e
          go test -v . -timeout 60m 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          PASSED=$(grep -c "^--- PASS" test_output.txt | tr -d '[:space:]' || echo "0")
          FAILED=$(grep -c "^--- FAIL" test_output.txt | tr -d '[:space:]' || echo "0")

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${TEST_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.terratest-test.outputs.passed }}' || '0';
            const failed = '${{ steps.terratest-test.outputs.failed }}' || '0';
            const exitCode = '${{ steps.terratest-test.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ pass' : '❌ fail';
            const overall = exitCode === '0'
              ? `✅ Overall: passed=${passed}, failed=0, errored=0, skipped=0`
              : `❌ Overall: passed=${passed}, failed=${failed}, errored=0, skipped=0`;

            const body = `## Terratest Test Results\n\n${overall}\n\n| Repo | Status | Passed | Failed |\n|--------|--------|--------|--------|\n| core-cloud-rds-scheduler-terraform | ${status} | ${passed} | ${failed} |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
