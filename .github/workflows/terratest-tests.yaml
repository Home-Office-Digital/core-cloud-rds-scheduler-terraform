name: Terratest Integration Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terratest-tests:
    name: terratest
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      OIDC_ROLE_TO_ASSUME: ${{ vars.OIDC_ROLE_TO_ASSUME }}
      PRIV_ROLE_TO_ASSUME: ${{ vars.PRIV_ROLE_TO_ASSUME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.0'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ env.OIDC_ROLE_TO_ASSUME }}

      - name: Assume privileged role
        id: assume-priv
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.PRIV_ROLE_TO_ASSUME }}
          aws-region: eu-west-2
          role-chaining: true
          role-skip-session-tagging: true

      - name: Export privileged role ARN for Terratest
        id: export-priv-role
        run: |
          PRIV_ROLE="$PRIV_ROLE_TO_ASSUME"
          echo "TF_VAR_automation_role_arn=$PRIV_ROLE" >> $GITHUB_ENV
          echo "privileged_role_arn=$PRIV_ROLE" >> $GITHUB_OUTPUT
          aws sts get-caller-identity

      - name: Get Go modules
        run: go mod download
        working-directory: tests/terratest

      - name: Run Terratest
        id: terratest-test
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          PRIV_ROLE_TO_ASSUME: ${{ env.PRIV_ROLE_TO_ASSUME }}
        working-directory: tests/terratest
        run: |
          set +e
          # Ensure tests that read ROLE_TO_ASSUME get the runtime privileged ARN
          export ROLE_TO_ASSUME="${PRIV_ROLE_TO_ASSUME}"
          echo "Using ROLE_TO_ASSUME=$ROLE_TO_ASSUME"
          go test -v . -timeout 60m 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          PASSED=$(grep -c "^--- PASS" test_output.txt | tr -d '[:space:]' || echo "0")
          FAILED=$(grep -c "^--- FAIL" test_output.txt | tr -d '[:space:]' || echo "0")

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${TEST_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.terratest-test.outputs.passed }}' || '0';
            const failed = '${{ steps.terratest-test.outputs.failed }}' || '0';
            const exitCode = '${{ steps.terratest-test.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ pass' : '❌ fail';
            const overall = exitCode === '0'
              ? `✅ Overall: passed=${passed}, failed=0, errored=0, skipped=0`
              : `❌ Overall: passed=${passed}, failed=${failed}, errored=0, skipped=0`;

            const body = `## Terratest Test Results\n\n${overall}\n\n| Repo | Status | Passed | Failed |\n|--------|--------|--------|--------|\n| core-cloud-rds-scheduler-terraform | ${status} | ${passed} | ${failed} |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
