name: Terraform Plan Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-tests:
    name: Terraform Plan Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform init (tests/plan)
        run: terraform init -backend=false
        working-directory: tests/plan

      - name: Copy Sonar properties to tests/plan
        run: cp sonar-project.properties tests/plan/

      - name: Run terraform tests
        id: terraform-test
        shell: bash
        run: |
          set +e
          terraform test -junit-xml=tests/plan/test-results.xml -test-directory=tests/plan 2>&1 | tee tests/plan/test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${TEST_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${TEST_EXIT_CODE}" -ne 0 ]; then exit "${TEST_EXIT_CODE}"; fi

      - name: Convert Terraform JUnit To SonarQube Generic Test Report
        if: always()
        shell: bash
        run: |
          python3 https://raw.githubusercontent.com/Home-Office-Digital/core-cloud-workflow-terraform-actions/main/scripts/terraform_junit_to_sonar.py --input tests/plan/test-results.xml --output tests/plan/sonar-test-results.xml

      - name: Convert Terraform JUnit To SonarQube Generic Coverage Report
        if: always()
        shell: bash
        run: |
          python3 https://raw.githubusercontent.com/Home-Office-Digital/core-cloud-workflow-terraform-actions/main/scripts/terraform_junit_to_sonar_coverage.py --input tests/plan/test-results.xml --output tests/plan/sonar-coverage.xml

      - name: Print Generated Reports
        if: always()
        shell: bash
        run: |
          cat tests/plan/test-results.xml || true
          cat tests/plan/sonar-test-results.xml || true
          cat tests/plan/sonar-coverage.xml || true

      - name: SonarQube Scan
        if: always()
        uses: sonarsource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.projectBaseDir=tests/plan
            -Dsonar.exclusions=**/.terraform/**,**/test-results.xml,**/sonar-test-results.xml,**/sonar-coverage.xml,**/.scannerwork/**
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.tf,**/*.tfvars,tests/**/*.tftest.hcl
            -Dsonar.terraform.file.suffixes=.tf,.tfvars,.tftest.hcl
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/**/*.tftest.hcl
            -Dsonar.test.exclusions=tests/sonar_test_anchor.py
            -Dsonar.text.inclusions=tests/**/*.tftest.hcl
            -Dsonar.testExecutionReportPaths=sonar-test-results.xml
            -Dsonar.coverageReportPaths=sonar-coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}