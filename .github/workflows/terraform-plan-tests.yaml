name: Terraform Plan Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-tests:
    name: Terraform Plan Tests
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL_EFFECTIVE: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN_EFFECTIVE: ${{ secrets.SONAR_TOKEN }}
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/tests/plan/terraform-providers-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        shell: bash
        run: terraform init -backend=false

      - name: Cache Terraform providers (tests/plan)
        uses: actions/cache@v4
        with:
          path: tests/plan/terraform-providers-cache
          key: ${{ runner.os }}-tf-providers-${{ hashFiles('.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tf-providers-

      - name: Mirror providers into cache (overwrite)
        shell: bash
        run: |
          MIRROR_DIR="${{ github.workspace }}/tests/plan/terraform-providers-cache"
          echo "Mirroring providers to ${MIRROR_DIR} (overwriting) from repo root"
          rm -rf "${MIRROR_DIR}" || true
          mkdir -p "${MIRROR_DIR}"
          terraform providers mirror "${MIRROR_DIR}"
          echo "== full cache listing =="
          find "${MIRROR_DIR}" -type f -print || true

      - name: Configure Terraform CLI to use the provider mirror
        shell: bash
        run: |
          MIRROR_PATH="${{ github.workspace }}/tests/plan/terraform-providers-cache"
          echo "Writing Terraform CLI config to use filesystem_mirror at ${MIRROR_PATH}"
          mkdir -p "$HOME"
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            filesystem_mirror {
              path = "${MIRROR_PATH}"
            }
          }
          EOF

      - name: Terraform init (tests/plan)
        shell: bash
        working-directory: tests/plan
        run: terraform init -backend=false

      - name: Debug provider cache and .terraform (tests/plan)
        if: always()
        shell: bash
        working-directory: tests/plan
        run: |
          echo "TF_PLUGIN_CACHE_DIR=${TF_PLUGIN_CACHE_DIR}"
          echo "== cache listing =="
          ls -la "$TF_PLUGIN_CACHE_DIR" || echo "cache missing"
          echo "== cache tree =="
          find "$TF_PLUGIN_CACHE_DIR" -type f -print || true
          echo "== tests/plan/.terraform =="
          ls -la .terraform || echo ".terraform missing"

      - name: Terraform validate (tests/plan)
        shell: bash
        working-directory: tests/plan
        run: terraform validate

      - name: Ensure Sonar projectKey for scanner
        if: always()
        shell: bash
        run: |
          mkdir -p tests/plan
          if [ -f sonar-project.properties ]; then
            cp sonar-project.properties tests/plan/sonar-project.properties
            echo "Copied repo sonar-project.properties to tests/plan/sonar-project.properties"
          else
            # Replace slash with colon to form a safe Sonar project key
            KEY="${GITHUB_REPOSITORY//\//:}"
            echo "sonar.projectKey=${KEY}" > tests/plan/sonar-project.properties
            echo "Wrote tests/plan/sonar-project.properties with projectKey=${KEY}"
          fi

      - name: Populate tests/plan .terraform with provider binary
        shell: bash
        run: |
          MIRROR_DIR="${{ github.workspace }}/tests/plan/terraform-providers-cache"
          echo "Looking for provider zip under ${MIRROR_DIR}"
          ZIP=$(find "$MIRROR_DIR" -type f -name "terraform-provider-aws_*_linux_amd64.zip" | head -n1 || true)
          if [ -z "$ZIP" ]; then
            echo "No provider zip found in mirror:"
            find "$MIRROR_DIR" -type f -print || true
            exit 0
          fi
          echo "Found provider zip: $ZIP"
          DEST="${{ github.workspace }}/tests/plan/.terraform/providers/registry.terraform.io/hashicorp/aws/6.45.0/linux_amd64"
          mkdir -p "$DEST"
          unzip -o "$ZIP" -d "$DEST" || true
          chmod +x "$DEST"/* || true
          echo "Provider extracted to $DEST"

      - name: Install provider into global terraform plugins dir
        shell: bash
        run: |
          MIRROR_DIR="${{ github.workspace }}/tests/plan/terraform-providers-cache"
          ZIP=$(find "$MIRROR_DIR" -type f -name "terraform-provider-aws_*_linux_amd64.zip" | head -n1 || true)
          if [ -z "$ZIP" ]; then
            echo "No provider zip found in mirror:"
            find "$MIRROR_DIR" -type f -print || true
            exit 0
          fi
          GLOBAL_DEST="$HOME/.terraform.d/plugins/registry.terraform.io/hashicorp/aws/6.45.0/linux_amd64"
          mkdir -p "$GLOBAL_DEST"
          echo "Extracting $ZIP to $GLOBAL_DEST"
          unzip -o "$ZIP" -d "$GLOBAL_DEST" || true
          chmod +x "$GLOBAL_DEST"/* || true
          echo "Global provider installed to $GLOBAL_DEST"

      - name: Prepare provider files for composite action
        shell: bash
        run: |
          echo "RUNNER_TEMP=$RUNNER_TEMP"
          echo "Copying extracted provider into runner temp and global plugin dir"
          SRC="${{ github.workspace }}/tests/plan/.terraform/providers/registry.terraform.io/hashicorp/aws/6.45.0/linux_amd64"
          if [ -d "$SRC" ]; then
            mkdir -p "$RUNNER_TEMP/.terraform/providers/registry.terraform.io/hashicorp/aws/6.45.0/linux_amd64"
            cp -r "$SRC"/* "$RUNNER_TEMP/.terraform/providers/registry.terraform.io/hashicorp/aws/6.45.0/linux_amd64/" || true
            echo "Copied to $RUNNER_TEMP/.terraform/providers/..."
          else
            echo "Source $SRC missing"
            ls -la "${{ github.workspace }}/tests/plan/.terraform/providers" || true
          fi
          echo "Listing $RUNNER_TEMP/.terraform.."
          ls -la "$RUNNER_TEMP/.terraform" || true

      - name: Terraform test
        id: terraform-test
        uses: Home-Office-Digital/core-cloud-workflow-terraform-actions/actions/test@main
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/tests/plan/terraform-providers-cache
          TF_DATA_DIR: ${{ github.workspace }}/tests/plan
          TF_LOG: DEBUG
        with:
          working-directory: tests/plan
          sonar-host-url: ${{ env.SONAR_HOST_URL_EFFECTIVE }}
          sonar-token: ${{ env.SONAR_TOKEN_EFFECTIVE }}

      - name: Pre-composite provider visibility debug
        if: always()
        shell: bash
        run: |
          echo "==== HOME .terraform.d/plugins ===="
          ls -la "$HOME/.terraform.d/plugins" || true
          find "$HOME/.terraform.d/plugins" -maxdepth 5 -type f -print || true
          echo "==== RUNNER_TEMP ===="
          echo "RUNNER_TEMP=$RUNNER_TEMP"
          ls -la "$RUNNER_TEMP" || true
          find "$RUNNER_TEMP" -maxdepth 3 -type f -print || true
          echo "==== tests/plan .terraform ===="
          ls -la "${{ github.workspace }}/tests/plan/.terraform" || true
          find "${{ github.workspace }}/tests/plan/.terraform" -maxdepth 4 -type f -print || true

      - name: Compute test results
        id: compute-test-results
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          # read the JUnit produced by the composite action in tests/plan
          INPUT_FILE="tests/plan/test-results.xml"
          PASSED=0
          FAILED=0
          if [ -f "$INPUT_FILE" ]; then
            PASSED=$(grep -c "<testcase" "$INPUT_FILE" || true)
            FAILED=$(grep -c "<failure" "$INPUT_FILE" || true)
          fi

          # Map composite step outcome to exit code
          if [ "${{ steps.terraform-test.outcome }}" = "success" ]; then
            EXIT_CODE=0
          else
            EXIT_CODE=1
          fi

          echo "passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.compute-test-results.outputs.passed }}' || '0';
            const failed = '${{ steps.compute-test-results.outputs.failed }}' || '0';
            const exitCode = '${{ steps.compute-test-results.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ pass' : '❌ fail';
            const overall = exitCode === '0'
              ? `✅ Overall: passed=${passed}, failed=0, errored=0, skipped=0`
              : `❌ Overall: passed=${passed}, failed=${failed}, errored=0, skipped=0`;

            const body = `## Terraform Plan Test Results\n\n${overall}\n\n| Repo | Status | Passed | Failed |\n|--------|--------|--------|--------|\n| core-cloud-rds-scheduler-terraform | ${status} | ${passed} | ${failed} |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });