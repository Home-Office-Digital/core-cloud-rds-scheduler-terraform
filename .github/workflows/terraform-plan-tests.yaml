name: Terraform Plan Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-tests:
    name: Terraform Plan Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform init (tests/plan)
        run: terraform init -backend=false
        working-directory: tests/plan

      - name: Copy Sonar properties to tests/plan
        run: cp sonar-project.properties tests/plan/

      - name: Run terraform tests and publish results (remote action branch)
        id: terraform-test
        uses: Home-Office-Digital/core-cloud-workflow-terraform-actions/actions/test@feature/CCL-8198-test-action-tweak
        with:
          working-directory: .
          test-directory: tests/plan
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

      - name: Debug Sonar context
        if: always()
        run: |
          echo "action outputs.has-tests=${{ steps.terraform-test.outputs.has-tests }}"
          if [ -n "${{ secrets.SONAR_HOST_URL }}" ]; then echo "SONAR_HOST_URL: present"; else echo "SONAR_HOST_URL: missing"; fi
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then echo "SONAR_TOKEN: present"; else echo "SONAR_TOKEN: missing"; fi
          echo "Files at repo root:"; ls -la sonar-test-results.xml sonar-coverage.xml || true
          echo "Files in tests/plan:"; ls -la tests/plan/sonar-test-results.xml tests/plan/sonar-coverage.xml || true
          echo "Preview sonar-test-results.xml (root):"; sed -n '1,120p' sonar-test-results.xml || true